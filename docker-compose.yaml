services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary data store
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: aeromdc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aeromedia
      POSTGRES_USER: aero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aero -d aeromedia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend — FastAPI + APScheduler ingestion engine
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: aeromdc_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aero:${POSTGRES_PASSWORD:-secure_pass}@db/aeromedia
      ROOKTEC_URL: ${ROOKTEC_URL:-https://www.rooktec.in/wmapp}
      ROOKTEC_USERNAME: ${ROOKTEC_USERNAME:-smb}
      ROOKTEC_PASSWORD: ${ROOKTEC_PASSWORD:-wind@smb}
      COLLECTION_INTERVAL_MINUTES: ${COLLECTION_INTERVAL_MINUTES:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    volumes:
      - ./Backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy + static frontend server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: aeromdc_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  pgdata:
    driver: local
